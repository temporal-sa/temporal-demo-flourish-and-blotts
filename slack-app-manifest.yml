_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: "Flourish & Blotts OMS"
  description: "Order Management System repair agent for Flourish & Blotts wizarding bookshop. Handles HITL approvals for magical order incidents."
  background_color: "#1a1f3a"

features:
  bot_user:
    display_name: "F&B OMS Agent"
    always_online: true

settings:
  socket_mode_enabled: true
  token_rotation_enabled: false
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - mpim:history
      - users:read
